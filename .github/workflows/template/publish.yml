name: Release and Publish

permissions:
  contents: write

env:
  CHANGELOG_CATEGORIES: |
    ### ✨ Features|✨,:sparkles:,🚀,:rocket:
    ### 🐛 Bug Fixes|🐛,:bug:,🚑️,:ambulance:
    ### 🎨 Refinement|🎨,:art:,♻️,:recycle:
    ### 🔒 Security|🔒,:lock:
    ### 📖 Documentation|📖,:book:,📝,:memo:

on:
  workflow_dispatch:
    inputs:
      modules:
        description: >
          Comma-separated list of Gradle submodule names to include as release artifacts.
          Use "." for a single-module project.
          Examples: "." | "API,Core,Server"
        required: true
        default: '.'
        type: string

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      version: ${{ env.VERSION }}
    steps:
      -   name: Checkout repository
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

      -   name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: gradle

      -   name: Grant execute permission for gradlew
          run: chmod +x gradlew

      -   name: Read version from gradle.properties
          run: |
            VERSION=$(grep -E "^version=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
            if [ -z "$VERSION" ]; then
              echo "❌ Could not read 'version' from gradle.properties"
              exit 1
            fi
            echo "VERSION=$VERSION" >> $GITHUB_ENV

      -   name: Build with Gradle
          run: ./gradlew build

      -   name: Generate Changelog
          id: changelog
          run: |
            export LC_ALL=C.UTF-8
            export LANG=C.UTF-8
            
            git fetch --tags --force
            
            CURRENT_TAG="${{ env.VERSION }}"
            PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -vx "$CURRENT_TAG" | head -n1)
            
            if [ -z "$PREVIOUS_TAG" ]; then
              # ── Initial release ────────────────────────────────────
              {
                echo "## 🚀 Initial Release $CURRENT_TAG"
                echo ""
                echo "This is the first release - so there is no changelog!"
              } > changelog.md
            else
              # ── Standard release ───────────────────────────────────
              {
                echo "## 🚀 Release $CURRENT_TAG"
                echo ""
              } > changelog.md
            
              git log --pretty=format:"%s (%h)" "$PREVIOUS_TAG"..HEAD > all_commits.txt
            
              ALL_MAPPED=""
            
              while IFS='|' read -r HEADER EMOJIS; do
                [ -z "$(echo "$HEADER" | tr -d '[:space:]')" ] && continue
            
                PATTERN="^($(echo "$EMOJIS" | tr ',' '|'))"
            
                if [ -n "$ALL_MAPPED" ]; then
                  ALL_MAPPED="${ALL_MAPPED}|${PATTERN}"
                else
                  ALL_MAPPED="${PATTERN}"
                fi
            
                MATCHES=$(grep -E "$PATTERN" all_commits.txt || true)
                if [ -n "$MATCHES" ]; then
                  echo "$HEADER" >> changelog.md
                  STRIP="^($(echo "$EMOJIS" | tr ',' '|')) "
                  echo "$MATCHES" | sed -E "s/$STRIP/- /" >> changelog.md
                  echo "" >> changelog.md
                fi
              done <<< "${{ env.CHANGELOG_CATEGORIES }}"
            
              OTHER=$(grep -vE "(${ALL_MAPPED}|^Merge)" all_commits.txt || true)
              if [ -n "$OTHER" ]; then
                echo "### 📦 Other Changes" >> changelog.md
                echo "$OTHER" | sed 's/^/- /' >> changelog.md
                echo "" >> changelog.md
              fi
            
              rm -f all_commits.txt
            fi
            
            cat changelog.md
            
            {
              echo "changelog<<EOF"
              cat changelog.md
              echo "EOF"
            } >> $GITHUB_OUTPUT

      -   name: Resolve JAR paths
          id: jars
          run: |
            MODULES="${{ inputs.modules }}"
            JAR_GLOBS=""
            
            IFS=',' read -ra MODULE_LIST <<< "$MODULES"
            for MODULE in "${MODULE_LIST[@]}"; do
              MODULE=$(echo "$MODULE" | tr -d '[:space:]')
              if [ "$MODULE" = "." ]; then
                BASE="build/libs"
              else
                BASE="$MODULE/build/libs"
              fi
              JAR_GLOBS="${JAR_GLOBS}${BASE}/*.jar"$'\n'
              JAR_GLOBS="${JAR_GLOBS}!${BASE}/*-dev.jar"$'\n'
              JAR_GLOBS="${JAR_GLOBS}!${BASE}/*-dev-shadow.jar"$'\n'
              JAR_GLOBS="${JAR_GLOBS}!${BASE}/*-sources.jar"$'\n'
              JAR_GLOBS="${JAR_GLOBS}!${BASE}/*-javadoc.jar"$'\n'
            done
            
            echo "Resolved JAR globs:"
            echo "$JAR_GLOBS"
            
            {
              echo "globs<<EOF"
              echo "$JAR_GLOBS"
              echo "EOF"
            } >> $GITHUB_OUTPUT

      -   name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ env.VERSION }}
            name: Release ${{ env.VERSION }}
            body: ${{ steps.changelog.outputs.changelog }}
            draft: false
            prerelease: false
            files: |
              ${{ steps.jars.outputs.globs }}
              LICENSE
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      -   name: Update README version
          run: |
            VERSION="${{ env.VERSION }}"
            # Maven:  <version>x.y.z</version>
            sed -i "s/<version>[0-9.]\+<\/version>/<version>$VERSION<\/version>/g" README.md
            # Gradle:  group:artifact:x.y.z
            sed -i "s/\(:[A-Za-z]\+:\)[0-9.]\+/\1$VERSION/g" README.md

      -   name: Bump patch version
          run: |
            CURRENT="${{ env.VERSION }}"
            MAJOR=$(echo "$CURRENT" | cut -d'.' -f1)
            MID=$(echo "$CURRENT"   | cut -d'.' -f2)
            PATCH=$(echo "$CURRENT" | cut -d'.' -f3)
    
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MID.$NEW_PATCH"
    
            sed -i "s/^version=.*/version=$NEW_VERSION/" gradle.properties
    
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      -   name: Commit and push changes
          run: |
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md gradle.properties
            git diff --staged --quiet && echo "Nothing to commit" && exit 0
            git commit -m "📝 Update README & bump version to ${{ env.NEW_VERSION }}"
            git push