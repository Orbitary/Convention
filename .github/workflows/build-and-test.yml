name: Build and Test

on:
  workflow_dispatch:
    inputs:
      java-version:
        description: 'Java version to build with'
        required: false
        default: '25'
        type: string
        options:
          - '17'
          - '21'
          - '25'
  workflow_call:
    inputs:
      java-version:
        required: false
        default: '25'
        type: string
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace --build-cache